<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Gaming World</title>
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <h2 class="logo">🎮 Gaming World</h2>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="games.html">Games</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
    </nav>

    <!-- CONTACT SECTION -->
    <section class="contact-section">

        <div class="contact-box">

            <h1>Contact Us</h1>
            <p>We’d love to hear from you 👇</p>

            <form>

                <div class="input-group">
                    <input type="text" required>
                    <label><i class="fa fa-user"></i> Your Name</label>
                </div>

                <div class="input-group">
                    <input type="email" required>
                    <label><i class="fa fa-envelope"></i> Your Email</label>
                </div>

                <div class="input-group">
                    <textarea rows="5" required></textarea>
                    <label><i class="fa fa-message"></i> Your Message</label>
                </div>

                <button type="submit">
                    <i class="fa fa-paper-plane"></i> Send Message
                </button>

            </form>

            <!-- EXTRA INFO -->
            <div class="contact-info">
                <p><i class="fa fa-envelope"></i> gamingworld@email.com</p>
                <p><i class="fa fa-phone"></i> +91 98765 43210</p>
            </div>

        </div>

    </section>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 Gaming World | Built for Gamers 🎮</p>
    </footer>

</body>

</html>
